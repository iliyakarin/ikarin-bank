# =============================================================================
# REFERENCE ONLY — This file contains MOCKED credentials.
# The actual JAAS config is generated at container startup from the template:
#   kafka-server-jaas.conf.tpl
# using init-db/kafka-entrypoint.sh, which substitutes values from .env.
# =============================================================================

KafkaServer {
  org.apache.kafka.common.security.plain.PlainLoginModule required
  user_admin="MOCKED_PASSWORD"
  user_kafka="MOCKED_PASSWORD"
  user_readonly_admin="MOCKED_PASSWORD";
};

Client {
  org.apache.zookeeper.server.auth.DigestLoginModule required
  username="kafka"
  password="MOCKED_PASSWORD";
};

KafkaClient {
  org.apache.kafka.common.security.plain.PlainLoginModule required
  username="admin"
  password="MOCKED_PASSWORD";
};

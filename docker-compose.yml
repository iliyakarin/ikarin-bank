version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: bank-postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - ./init-db/postgres_init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d banking_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: bank-clickhouse
    environment:
      - CLICKHOUSE_DB=banking_log

    ports:
      - "8123:8123"
    volumes:
      - ./init-db/clickhouse_init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./init-db/readonly-user.xml:/etc/clickhouse-server/users.d/readonly-user.xml
      - ./data/clickhouse:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: bank-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=SASL_PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=SASL_PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=SASL_PLAINTEXT
      - KAFKA_SASL_ENABLED_MECHANISMS=PLAIN
      - KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL=PLAIN
      - KAFKA_LISTENER_NAME_SASL_PLAINTEXT_SASL_JAAS_CONFIG=org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="REDACTED" user_admin="REDACTED" user_kafka="REDACTED";
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_OPTS=-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf
    volumes:
      - ./data/kafka:/var/lib/kafka/data
      - ./init-db/kafka-server-jaas.conf:/etc/kafka/kafka_server_jaas.conf:ro


  api:
    build: ./backend
    # Removed container_name to allow scaling multiple instances
    command: gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    env_file: .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PYTHONUNBUFFERED=1
    # Removed ports binding to avoid conflicts when scaling
    # ports:
    #   - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      clickhouse:
        condition: service_healthy

  proxy:
    image: nginx:alpine
    container_name: bank-proxy
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

  consumer:
    build: ./backend
    container_name: bank-consumer
    command: python consumer.py
    env_file: .env
    volumes:
      - ./backend:/app
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PYTHONUNBUFFERED=1
      - CLICKHOUSE_USER=writer
      - CLICKHOUSE_PASSWORD=writer_secure_2025

    depends_on:
      kafka:
        condition: service_started
      clickhouse:
        condition: service_healthy
  outbox-worker:
    build: ./backend
    container_name: bank-outbox-worker
    command: python outbox_worker.py
    env_file: .env
    volumes:
      - ./backend:/app
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  sync-checker:
    build: ./backend
    container_name: bank-sync-checker
    command: python sync_checker.py
    env_file: .env
    volumes:
      - ./backend:/app
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy




  vendor-simulator:
    build: ./vendor-simulator
    container_name: bank-vendor-simulator
    ports:
      - "8001:8001"
    env_file: .env

  frontend:
    build: ./frontend
    container_name: bank-frontend
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - api

  scheduled-payments-worker:
    build: ./backend
    container_name: bank-scheduled-payments-worker
    command: python scheduled_payments_worker.py
    env_file: .env
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy

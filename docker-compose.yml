services:
  postgres:
    image: postgres:16-alpine
    container_name: bank-postgres
    env_file: .env.dev
    security_opt:
      - no-new-privileges:true
    ports:
      - "5432:5432"
    volumes:
      - ./init-db/postgres_init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: bank-clickhouse
    env_file: .env.dev
    security_opt:
      - no-new-privileges:true
    ports:
      - "8123:8123"
    volumes:
      - ./init-db/clickhouse_init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./data/clickhouse:/var/lib/clickhouse
      - ./init-db/setup-admin.xml:/etc/clickhouse-server/users.d/setup-admin.xml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: bank-kafka
    security_opt:
      - no-new-privileges:true
    ports:
      - "9092:9092"
    env_file: .env.dev
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=SASL_PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=SASL_PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=SASL_PLAINTEXT
      - KAFKA_SASL_ENABLED_MECHANISMS=PLAIN
      - KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL=PLAIN
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_OPTS=-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf -DKAFKA_ADMIN_PASSWORD=admin123 -DKAFKA_CLIENT_PASSWORD=admin123
    volumes:
      - ./data/kafka:/var/lib/kafka/data
      - ./init-db/kafka-server-jaas.conf:/etc/kafka/kafka_server_jaas.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s


  api:
    build: ./backend
    # Removed container_name to allow scaling multiple instances
    command: gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    env_file: .env.dev
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PYTHONUNBUFFERED=1
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Removed ports binding to avoid conflicts when scaling
    # ports:
    #   - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  proxy:
    image: nginxinc/nginx-unprivileged:alpine
    container_name: bank-proxy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "8000:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

  consumer:
    build: ./backend
    container_name: bank-consumer
    command: python consumer.py
    env_file: .env.dev
    volumes:
      - ./backend:/app
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PYTHONUNBUFFERED=1
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
  outbox-worker:
    build: ./backend
    container_name: bank-outbox-worker
    command: python outbox_worker.py
    env_file: .env.dev
    volumes:
      - ./backend:/app
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PYTHONUNBUFFERED=1
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  sync-checker:
    build: ./backend
    container_name: bank-sync-checker
    command: python sync_checker.py
    env_file: .env.dev
    volumes:
      - ./backend:/app
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PYTHONUNBUFFERED=1
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: bank-frontend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "3000:3000"
    env_file: .env.dev
    depends_on:
      - api



  scheduled-payments-worker:
    build: ./backend
    container_name: bank-scheduled-payments-worker
    command: python scheduled_payments_worker.py
    env_file: .env.dev
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      postgres:
        condition: service_healthy

  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: bank-cloudflared
  #   env_file: .env.dev
  #   command: tunnel --no-autoupdate run
  #   depends_on:
  #     - proxy

  vendor-simulator:
    build: ./vendor-simulator
    container_name: bank-vendor-simulator
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "8001:8001"
    env_file: .env.dev
    environment:
      - VENDOR_SIMULATOR_DB_HOST=vendor-simulator-db
      - SIMULATOR_API_KEY=${SIMULATOR_API_KEY}
    depends_on:
      vendor-simulator-db:
        condition: service_healthy

  vendor-simulator-db:
    image: postgres:16-alpine
    container_name: bank-vendor-simulator-db
    env_file: .env.dev
    security_opt:
      - no-new-privileges:true
    environment:
      - POSTGRES_USER=${VENDOR_SIMULATOR_DB_USER}
      - POSTGRES_PASSWORD=${VENDOR_SIMULATOR_DB_PASSWORD}
      - POSTGRES_DB=${VENDOR_SIMULATOR_DB_NAME}
    ports:
      - "5434:5432"
    volumes:
      - ./data/vendor-simulator:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VENDOR_SIMULATOR_DB_USER} -d ${VENDOR_SIMULATOR_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  fed-gateway-db:
    image: postgres:16-alpine
    container_name: fed-gateway-db
    env_file: .env.dev
    security_opt:
      - no-new-privileges:true
    environment:
      - POSTGRES_USER=${FED_GATEWAY_DB_USER}
      - POSTGRES_PASSWORD=${FED_GATEWAY_DB_PASSWORD}
      - POSTGRES_DB=${FED_GATEWAY_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - ./data/fed-gateway:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FED_GATEWAY_DB_USER} -d ${FED_GATEWAY_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mock-fed-gateway:
    build: ./mock-fed-gateway
    container_name: mock-fed-gateway
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    env_file: .env.dev
    environment:
      - FED_GATEWAY_DB_HOST=fed-gateway-db
      - GATEWAY_API_KEY=${GATEWAY_API_KEY}
    ports:
      - "8002:8002"
    depends_on:
      fed-gateway-db:
        condition: service_healthy

  deposit-funds-mock:
    build: ./deposit-funds-mock
    container_name: deposit-funds-mock
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "8003:8000"

  playwright:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    container_name: bank-playwright
    env_file: .env.dev
    security_opt:
      - no-new-privileges:true
    working_dir: /app/frontend
    volumes:
      - .:/app
    environment:
      - PLAYWRIGHT_BASE_URL=http://frontend:3000
    depends_on:
      - frontend
    command: npx playwright test --project=chromium

services:
  postgres:
    image: postgres:16-alpine
    container_name: bank-postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - ./init-db/postgres_init.sql:/docker-entrypoint-initdb.d/init.sql

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: bank-clickhouse
    env_file: .env
    ports:
      - "8123:8123"
    volumes:
      - ./init-db/clickhouse_init.sql:/docker-entrypoint-initdb.d/init.sql

zookeeper:
  image: bitnami/zookeeper:latest
  environment:
    - ALLOW_ANONYMOUS_LOGIN=yes

kafka:
  image: bitnami/kafka:latest
  ports:
    - "9092:9092"
  environment:
    - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
    - ALLOW_ANONYMOUS_LOGIN=yes
    - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
  depends_on:
    - zookeeper

# This will be our background worker
consumer:
  build: ./backend
  command: python consumer.py
  env_file: .env
  depends_on:
    - kafka
    - clickhouse

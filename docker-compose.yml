version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: bank-postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - ./init-db/postgres_init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d banking_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: bank-clickhouse
    env_file: .env
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    ports:
      - "8123:8123"
    volumes:
      - ./init-db/clickhouse_init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./init-db/readonly-user.xml:/etc/clickhouse-server/users.d/readonly-user.xml
      - ./data/clickhouse:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: bank-zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=no
      - ZOO_JVMFLAGS=-Djava.security.auth.login.config=/etc/zookeeper/jaas.conf
      - ZOOKEEPER_CLIENT_PORT=2181
    volumes:
      - ./data/zookeeper:/var/lib/zookeeper
      - ./data/zookeeper/datalog:/var/log/zookeeper
      - ./init-db/zookeeper-jaas.conf:/etc/zookeeper/jaas.conf:ro
      - ./init-db/zoo.cfg:/conf/zoo.cfg:ro

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: bank-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=SASL_PLAINTEXT://0.0.0.0:9092
      - KAFKA_ADVERTISED_LISTENERS=SASL_PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=SASL_PLAINTEXT:SASL_PLAINTEXT
      - KAFKA_SASL_ENABLED_MECHANISMS=PLAIN
      - KAFKA_SECURITY_INTER_BROKER_PROTOCOL=SASL_PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=SASL_PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_OPTS=-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf
    volumes:
      - ./data/kafka:/var/lib/kafka/data
      - ./init-db/kafka-server-jaas.conf:/etc/kafka/kafka_server_jaas.conf:ro
    depends_on:
      - zookeeper

  api:
    build: ./backend
    container_name: bank-api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      clickhouse:
        condition: service_healthy

  consumer:
    build: ./backend
    container_name: bank-consumer
    command: python consumer_optimized.py
    env_file: .env
    depends_on:
      kafka:
        condition: service_started
      clickhouse:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: bank-frontend
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - api

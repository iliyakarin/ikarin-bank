name: Build and Publish Docker Images

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: ${{ github.repository }}

jobs:
  checks:
    name: Lint, Secrets, and Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest httpx sqlalchemy
          
      - name: Run Backend Tests
        run: |
          cd backend && export PYTHONPATH=. && pytest tests/
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install frontend dependencies
        run: |
          cd frontend && npm ci
          
      - name: Run Frontend Tests
        run: |
          cd frontend && npm test

  playwright-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: |
          cd frontend && npm ci
          npx playwright install --with-deps chromium
          
      - name: Build and Start Containers
        run: |
          docker compose up -d postgres clickhouse kafka api frontend
          # Wait for services to be ready
          sleep 30
          
      - name: Run Playwright tests
        run: |
          cd frontend && npx playwright test --project=chromium
          
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: playwright-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - context: ./backend
            image_suffix: backend
          - context: ./frontend
            image_suffix: frontend
          - context: ./vendor-simulator
            image_suffix: vendor-simulator
          - context: ./mock-fed-gateway
            image_suffix: mock-fed-gateway
          - context: ./deposit-funds-mock
            image_suffix: deposit-funds-mock

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-${{ matrix.image_suffix }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
